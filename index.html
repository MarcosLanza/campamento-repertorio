<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Repertorio Campamento</title>

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:#0d1117;
      color:white;
    }

    .header{
      position:fixed;
      width:100%;
      background:rgba(13,17,23,.85);
      backdrop-filter:blur(10px);
      z-index:100;
    }

    .header-inner{
      max-width:960px;
      margin:auto;
      padding:15px;
    }

    h1{text-align:center;margin:0 0 10px}

    .filters{
      display:flex;
      gap:8px;
    }

    .filter-btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:20px;
      background:#1f2937;
      color:white;
      cursor:pointer;
    }

    .filter-btn.active{
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .container{
      max-width:960px;
      margin:auto;
      padding:20px;
      padding-top:120px;
    }

    .day-title{
      font-size:22px;
      font-weight:bold;
      margin-top:20px;
    }

    .musicians{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:10px 0;
    }

    .musician{
      display:flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:20px;
      background:rgba(34,197,94,.15);
      font-size:12px;
    }

    .cards{
      display:grid;
      gap:12px;
      margin-top:8px;
    }

    .card{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px;
      border-radius:14px;
      background:#161b22;
      transition:.25s;
    }

    .card:hover{
      transform:scale(1.02);
      background:#1f2937;
    }

    .thumb{
      width:90px;
      height:60px;
      border-radius:10px;
      object-fit:cover;
    }

    .info{flex:1}

    .title{font-weight:700;font-size:14px}

    .meta{font-size:12px;opacity:.7}

    .play{
      background:#d31414;
      border:none;
      width:38px;
      height:38px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .play:hover{
      background:#16a34a;
      transform:scale(1.1);
    }
  </style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <h1>🎶 Repertorio Campamento</h1>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('Viernes',this)">Viernes</button>
      <button class="filter-btn" onclick="setFilter('Sábado',this)">Sábado</button>
      <button class="filter-btn" onclick="setFilter('Domingo',this)">Domingo</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="list"></div>
</div>

<script>

function getIcon(role){
  return {
    guitar:"guitar",
    piano:"piano",
    voice:"mic",
    drums:"drum",
    bass:"music"
  }[role] || "user";
}

const repertoire = [

},

],

songs:[
{name:"Quien Dices Que Soy",tone:"Original",link:"https://www.youtube.com/watch?v=ZYFzPkANmXk"},

{name:"Tu Amor No Tiene Fin",tone:"Original",link:"https://www.youtube.com/watch?v=1hPCABGSHk4&list=RD1hPCABGSHk4&start_radio=1"},
{name:"En Tu Luz",tone:"C",link:"https://www.youtube.com/watch?v=Wibcq_r0TlQ"},

{name:"Mi Gozo",tone:"Original",link:"https://www.youtube.com/watch?v=IxD3JiOo9DY"},
{name:"Adiós al Ayer",tone:"Original",link:"https://www.youtube.com/watch?v=CQb8HhAn1LU"}

},

{

musicians:[

{name:"Pablo",role:"piano"},

songs:[

{name:"Cristo yo te amo + Es Él",tone:"?",link:"https://www.youtube.com/watch?v=oLD7RC9YFtg&list=RDoLD7RC9YFtg&start_radio=1"},
{name:"Entre Las Llamas / Hermoso nombre puente",tone:"Original",link:"https://www.youtube.com/watch?v=MfuKzJFwl_k&list=RDMfuKzJFwl_k&start_radio=1"},
{name:"De tumbas a jardines",tone:"G",link:"https://www.youtube.com/watch?v=83l5uaVEbFs"}

{name:"Tómalo",tone:"Original",link:"https://www.youtube.com/watch?v=V-7bb6ir8ro"},
{name:"Correré",tone:"Original",link:"https://www.youtube.com/watch?v=BY51wjW6gbg"},
{name:"Soy Libre Hillsong",tone:"Em",link:"https://www.youtube.com/watch?v=UgJsSzRk_sk"},
{name:"Loco Rescate",tone:"Original",link:"https://www.youtube.com/watch?v=noG5STmlX38"}
]}
]
}
];

let currentFilter="all";

function getYouTubeID(url){
const match=url.match(/v=([^&]+)/);
return match?match[1]:null;
}

function render(){
const list=document.getElementById("list");
let html="";

repertoire.forEach(day=>{
if(currentFilter!=="all" && day.day!==currentFilter)return;

html+=`<div>
<div class="day-title">${day.day}</div>

<div class="musicians">
${day.musicians.map(m=>`
<span class="musician">
<i data-lucide="${getIcon(m.role)}"></i>
${m.name}
</span>`).join("")}
</div>`;

day.sections.forEach(section=>{
html+=`<div class="meta">${section.time}</div><div class="cards">`;

section.songs.forEach((song,i)=>{
const id=getYouTubeID(song.link);

html+=`
<div class="card">
<img class="thumb" src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<div class="info">
<div class="title">${i+1}. ${song.name}</div>
<div class="meta">🎵 ${song.tone}</div>
</div>
<button class="play" onclick="window.open('${song.link}')">
<i data-lucide="play"></i>
</button>
</div>`;
});

html+=`</div>`;
});

html+=`</div>`;
});

list.innerHTML=html;
lucide.createIcons();
}

function setFilter(f,btn){
currentFilter=f;
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

render();

</script>

</body>
</html>
