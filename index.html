<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repertorio Campamento</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      background: #0d1117;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(34,197,94,0.18), transparent 30%),
        radial-gradient(circle at right, rgba(59,130,246,0.15), transparent 25%),
        linear-gradient(180deg, #111827 0%, #0d1117 100%);
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(13, 17, 23, 0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }

    .header-inner {
      max-width: 960px;
      margin: auto;
      padding: 16px;
      transition: all 0.3s ease;
    }

    .header.compact .header-inner {
      padding: 8px 14px;
    }

    h1 {
      text-align: center;
      margin: 4px 0 6px;
      font-size: 22px;
      transition: 0.3s;
    }

    .header.compact h1 {
      font-size: 16px;
      margin: 2px 0 4px;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }

    #search {
      width: 100%;
      padding: 14px 16px;
      border-radius: 999px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
    }

    #search::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      flex: 1;
      min-width: 120px;
      padding: 11px 12px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .filter-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 8px 24px rgba(34,197,94,0.28);
    }

    .container {
      max-width: 960px;
      margin: auto;
      padding: 16px;
      padding-top: 190px;
      padding-bottom: 40px;
    }

    .day-block {
      margin-bottom: 28px;
    }

    .day-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.3px;
      color: #f8fafc;
    }

    .time-block {
      margin-bottom: 18px;
    }

    .time-title {
      margin: 0 0 10px;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 12px;
      display: inline-block;
      background: rgba(255,255,255,0.06);
      color: #93c5fd;
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.07);
    }

    .thumb,
    .thumb-placeholder {
      width: 86px;
      height: 58px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .thumb-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1f2937, #374151);
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 6px;
    }

    .info {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
      color: #ffffff;
    }

    .sub {
      font-size: 12px;
      opacity: 0.9;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #e5e7eb;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .badge.tone {
      background: rgba(59,130,246,0.16);
      color: #bfdbfe;
    }

    .badge.pending {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
    }

    .badge.order {
      background: rgba(34,197,94,0.15);
      color: #bbf7d0;
    }

    button.play {
      background: linear-gradient(135deg, #c5222a, #610a19);
      border: none;
      padding: 10px 12px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button.play:hover {
      transform: scale(1.04);
    }

    button.play.disabled {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      cursor: not-allowed;
    }

    .empty {
      text-align: center;
      padding: 30px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
    }

    @media (max-width: 640px) {
      .container {
        padding-top: 215px;
      }

      .card {
        align-items: flex-start;
      }

      .thumb,
      .thumb-placeholder {
        width: 74px;
        height: 56px;
      }

      .title {
        font-size: 14px;
      }

      .filter-btn {
        min-width: calc(50% - 4px);
      }
    }
  </style>
</head>
<body>

  <div class="header" id="header">
    <div class="header-inner">
      <h1>🎶 Repertorio Campamento</h1>
      <p class="subtitle">Ordenado por día y horario</p>

      <input
        id="search"
        type="text"
        placeholder="Buscar canción o tono..."
        onkeyup="applyFilters()"
      />

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">✨ Todos</button>
        <button class="filter-btn" onclick="setFilter('Viernes', this)">🔥 Viernes</button>
        <button class="filter-btn" onclick="setFilter('Sábado', this)">🌤️ Sábado</button>
        <button class="filter-btn" onclick="setFilter('Domingo', this)">🙏 Domingo</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="list"></div>
  </div>

  <script>
    const repertoire = [
      {
        day: "Viernes",
        sections: [
          {
            time: "9:30 a 10:00 am /  Tema El que se humilla será exaltado.",
            songs: [
              { name: "Dios Es Amor", tone: "?", link: "https://www.youtube.com/watch?v=NyiR9jpZEgA" },
              { name: "Libre Soy Scarpeta", tone: "Original", link: "https://www.youtube.com/watch?v=Koz_iMvlGzM" },
              { name: "A Danzar", tone: "D o Bm", link: "https://www.youtube.com/watch?v=W9tUnz5dvXg" },
              { name: "De tumbas a jardines", tone: "G", link: "https://www.youtube.com/watch?v=83l5uaVEbFs" },
              { name: "Mover Tu Corazón", tone: "A", link: "https://www.youtube.com/watch?v=36udEk2LxuA" },
              { name: "Es Él / Nuestra Prioridad", tone: "A", link: "https://www.youtube.com/watch?v=GmKYb7nl8rM" }
            ]
          }
        ]
      },
      {
        day: "Sábado",
        sections: [
          {
            time: "9:00 a 9:30 / Tema No estás aquí por casualidad.Dios te eligió por amor!",
            songs: [
              { name: "Como En El Cielo", tone: "C", link: "https://www.youtube.com/watch?v=y3tyQqjS4qY" },
              { name: "Dame a Cristo", tone: "C", link: "https://www.youtube.com/watch?v=n-uoCeB-WCg" },
              { name: "En Tu Luz", tone: "C", link: "https://www.youtube.com/watch?v=Wibcq_r0TlQ" },
              { name: "Somos Libres", tone: "G", link: "https://www.youtube.com/watch?v=_wiXgfg5heQ" },
              { name: "Mi Gozo", tone: "D", link: "https://www.youtube.com/watch?v=IxD3JiOo9DY" },
              { name: "Adiós al Ayer", tone: "Original", link: "https://www.youtube.com/watch?v=CQb8HhAn1LU" }
            ]
          }
        ]
      },
      {
        day: "Domingo",
        sections: [
          {
            time: "8:30 a 9:00  / Tema: Enfoque misericordia ",
            songs: [
              { name: "Vivo Estás", tone: "Original", link: "https://www.youtube.com/watch?v=HSQzeIaPgIg" },
              { name: "Glorioso Día", tone: "Original", link: "https://www.youtube.com/watch?v=bhPdS_ZUKg8" },
              { name: "Dios No Está Muerto", tone: "Original", link: "https://www.youtube.com/watch?v=S_OTz-lpDjw" },
              { name: "Generación que Danza", tone: "Original", link: "https://www.youtube.com/watch?v=2WZjGOi73qY" },
              { name: "Lavado", tone: "Original", link: "https://www.youtube.com/watch?v=C75PF1pOM40" }

            ]
          },
        
          {
            time: "9:30 a 10:30",
            songs: [
              { name: "Al que esta sentado en el trono", tone: "D", link: "https://www.youtube.com/watch?v=-fO6uxCSEUI" },
              { name: "Mi plenitud", tone: "-", link: "" },
              { name: "Quiero conocer a Jesús", tone: "-", link: "" },
              { name: "Hermoso Nombre", tone: "C", link: "https://www.youtube.com/watch?v=ZoKsBeoEW18" },
              { name: "Los Brazos de Papá", tone: "C", link: "https://www.youtube.com/watch?v=BGDOdMpTV2o" }

            ]
          },
          {
            time: "1:30 El mundo necesita mas de tu sonrisa,mas amor, mas amabilidad, el mundo necesita a Jesus. Final",
            songs: [
              { name: "Deseable", tone: "A", link: "https://www.youtube.com/watch?v=mkMWflyvhzw" },
              { name: "Quien Dices Que Soy", tone: "Original", link: "https://www.youtube.com/watch?v=ZYFzPkANmXk" },
              { name: "Yo Te Amo", tone: "C", link: "https://www.youtube.com/watch?v=whB-i-WzaT4" },
              { name: "Desde Mi Interior", tone: "Original", link: "https://www.youtube.com/watch?v=pORjEfnPALk" },
              { name: "Es Tiempo", tone: "Original", link: "https://www.youtube.com/watch?v=OZzCl21qM-s" },
              { name: "Tómalo", tone: "Original", link: "https://www.youtube.com/watch?v=V-7bb6ir8ro" },
              { name: "Correré", tone: "Original", link: "https://www.youtube.com/watch?v=BY51wjW6gbg" },
              { name: "Soy Libre Hillsong", tone: "Em", link: "https://www.youtube.com/watch?v=UgJsSzRk_sk" },
              { name: "Loco Rescate", tone: "Original", link: "https://www.youtube.com/watch?v=noG5STmlX38" }
            ]
          }
        ]
      }
    ];

    let currentFilter = "all";

    window.addEventListener("scroll", () => {
      const header = document.getElementById("header");
      header.classList.toggle("compact", window.scrollY > 40);
    });

    function getYouTubeID(url) {
      if (!url) return null;
      const reg = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
      const match = url.match(reg);
      return match ? match[1] : null;
    }

    function thumb(url) {
      const id = getYouTubeID(url);
      return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "";
    }

    function safeTone(tone) {
      if (!tone || tone === "-" ) return "Sin tono";
      if (tone === "O") return "Original";
      return tone;
    }

    function card(song, index) {
      const hasLink = !!song.link;
      const image = thumb(song.link);

      return `
        <div class="card">
          ${
            image
              ? `<img class="thumb" src="${image}" alt="${song.name}">`
              : `<div class="thumb-placeholder">Sin<br>link</div>`
          }

          <div class="info">
            <div class="title">${index}. ${song.name}</div>
            <div class="sub">
              <span class="badge order">Orden ${index}</span>
              <span class="badge tone">🎵 ${safeTone(song.tone)}</span>
              ${!hasLink ? `<span class="badge pending">Pendiente</span>` : ``}
            </div>
          </div>

          <button
            class="play ${!hasLink ? "disabled" : ""}"
            onclick="${hasLink ? `window.open('${song.link}', '_blank')` : ""}"
            ${!hasLink ? "disabled" : ""}
          >
            ▶
          </button>
        </div>
      `;
    }

    function render() {
      const list = document.getElementById("list");
      const text = document.getElementById("search").value.trim().toLowerCase();

      let filteredDays = repertoire;

      if (currentFilter !== "all") {
        filteredDays = repertoire.filter(day => day.day === currentFilter);
      }

      let html = "";

      filteredDays.forEach(dayBlock => {
        let dayHasResults = false;
        let dayHTML = `<div class="day-block"><h2 class="day-title">${dayBlock.day}</h2>`;

        dayBlock.sections.forEach(section => {
          const filteredSongs = section.songs.filter(song => {
            const name = (song.name || "").toLowerCase();
            const tone = (song.tone || "").toLowerCase();
            return name.includes(text) || tone.includes(text);
          });

          if (filteredSongs.length > 0) {
            dayHasResults = true;
            dayHTML += `
              <div class="time-block">
                <div class="time-title">🕒 ${section.time}</div>
                <div class="cards">
                  ${filteredSongs.map((song, i) => card(song, i + 1)).join("")}
                </div>
              </div>
            `;
          }
        });

        dayHTML += `</div>`;

        if (dayHasResults) {
          html += dayHTML;
        }
      });

      if (!html) {
        html = `<div class="empty">No encontré canciones con esa búsqueda.</div>`;
      }

      list.innerHTML = html;
    }

    function applyFilters() {
      render();
    }

    function setFilter(type, btn) {
      currentFilter = type;

      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.remove("active");
      });

      btn.classList.add("active");
      render();
    }

    render();
  </script>

</body>
</html>
